## Hypothesis

**Hypothesis:** For a large UK estate, an assessment generated purely from public / commercially-available and remotely-sensed data will be judged by an expert land agent or estate manager as both credible and non-obvious.
<!-- .element: class="fragment" -->
<ul>
<li class="fragment"><strong>output</strong>: a generated assessment to be provided to estate manager</li>
<li class="fragment"><strong>credible</strong>: accurate enough to act on for triage</li>
<li class="fragment"><strong>non-obvious</strong>: surfaces at least one estate-specific insight they hadn't already costed</li>
</ul>

**Falsified if:** for the majority of test estates, the expert judges the output wrong, generic, or something they wouldn't attach their name to. 
<!-- .element: class="fragment" -->

<br /> 
<br />


**Benefits for the startup:** it's the cheapest test of the question that decides the whole company: is this a scalable product or a consultancy? 
<!-- .element: class="fragment" -->

**Benefits for OS:** it's a live test of whether OS data can support zero-touch assessments in this vertical, and a concrete instance of the ecosystem model working, a third party creating a new use case on the OS data estate that OS itself wouldn't build.
<!-- .element: class="fragment" -->

Note:

- Riskiest assumption I can test with this team in this time — not the easiest: is this a scalable product?
- Founder framing: trust + decision + unit economics.
- Ground truth: assume the startup has it.
- Three ways to fail on purpose. A clean "no" is still a result.

--

<!-- .slide: class="subcols" -->

### **Why this, this sprint**

Six weeks should resolve the one question that decides what company this is: scalable product or consultancy. 

That question determines where the founders invest for the next year — a product justifies building the pipeline and engine (and possibly raising venture financing); a consultancy justifies relationships and billable judgement. Building toward the wrong one is an expensive mistake to make.

The hypothesis derisks the key question in this fork: an assessment produced from public / commercially-available data alone, judged by an expert as _credible_ (accurate enough to trust) and _non-obvious_ (surfacing something they hadn't costed). 

Credible tests accuracy; public-data-only tests cost-to-serve. Pass, the product thesis survives; fail, you're a consultancy — and you've learned it in six weeks, not twelve months.

**Alternatives rejected:**

- _Optimisation engine_ — the expensive build you only justify _after_ the feasibility of credible data-driven assessment is tested. Premature.
- _Polished SaaS shell_ — assumes the product thesis instead of testing it.
- _Data-integration automation_ — a scaling problem, not a validation one. Tests nothing yet.
- _Pure market research_ — weaker than an expert reacting to a real assessment of an estate they know. (Runs in parallel anyway; needs no engineers.)

Each rejected option feels like progress while leaving the company-defining question unanswered. The chosen one, resolved either way, tells the founders where to invest.

### The three spikes

Six weeks is the box, not a schedule. The spikes run in risk order and overlap; the plan flexes as each returns.

**Spike 1 — Data fitness.** _Retires input risk._ Before modeling anything, establish which OS and HMLR layers exist for the estate and whether they're usable — roof geometry and aspect, land cover, terrain, parcel extent. This is the start of the data-fitness map. If the inputs aren't there, we learn it first and cheaply.

**Spike 2 — Generation and ranking accuracy.** _Retires the core risk._ Model generation and storage potential, produce a ranked set of interventions with an explicit confidence level, and check it against the startup's ground truth. Credibility is won or lost here.

**Spike 3 — Decision-value.** _Retires the "so what."_ Put the ranking — made legible by the frontend — in front of the owner and their advisor. Would it change what they'd do? Accurate-but-inert is a real outcome, and one worth catching.

**Deliberately out of scope:** a full estate demand model, a grid-connection engine, anything that needs a site visit. Naming the boundary is part of the design.

**Principles**
- Spec-driven <!-- .element: class="fragment" -->
- Modular: clean interfaces between components <!-- .element: class="fragment" -->
- Testing, observability, evals in early <!-- .element: class="fragment" -->

- Modular means we can swap, upgrade, debug, delegate

**Rationale** <!-- .element: class="fragment" -->

<ul>
<li class="fragment"><strong>Familiar</strong>: the standard geospatial stack</li>
<li class="fragment"><strong>Well-documented</strong>: mature OSS, open standards, better for agents</li>
<li class="fragment"><strong>Simple modules</strong>: small, single-purpose steps with clean interfaces; swappable and testable.</li>
<li class="fragment"><strong>Automatable, not automated</strong>: code + version control means later automation is wiring, not a rewrite.</li>
</ul>


Note:

- Stack (20s), fast — talk to the shape, don't read cards.
- Familiar tech over relearning, unless there's a real reason: a customer requirement or a capability gap.
- Classical over learned — interpretable, fast, and no training data exists yet anyway.
- Everything's in code and on GitHub from day one. Even the parts we wizard-of-oz, we stitch by hand — but each step is a script, not clicks in a QGIS project. Manual → automated later is just wiring, not a rewrite.
- The interface that matters is data-shape-IN to a stable estate record — hold that contract and every model behind it is swappable. That's what lets us experiment component-by-component.
